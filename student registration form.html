<html>
    <head>
        <title>Student Registration form</title>
        </head>
        <body bgcolor="gray">
            <form> 
                <fieldset>
                <table align="center"width="700"cellpadding="10">
                    <tr>
                        <td colspan="2" align="center">
                        <h1>Student Registration Form </h1>
                    </td>
                    </tr>
                    <tr>
                        <td>Student name:</td>
                        <td>
                            <input type ="text" size="21" placeholder="First name"/>
                            -
                            <input type="text"  size="21" placeholder="Last name"/>
                            </td>
                            </tr>

                            <tr>
                                <td>Father's name:</td>
                                <td><input type="text" size="50"/></td>
                                </tr>

                                <tr>
                                    <td>Date of birth:</td>
                                    <td>
                                        <input type="text" size="3" Placeholder="Day"/> -
                                        <input type="text" size="3" placeholder="month"/>-
                                        <input type="text" size="8"placeholder="year"/>
                                        <i>(DD-MM-YYYY)</i>
                                        </td>
                                        </tr>

                                        <tr>
                                            <td>Mobile no.:</td>
                                            <td>
                                                <input type="text" size="1" value="+91"/>
                                                <input type ="text" size="42"/>
                                                </td>
                                                </tr>
                                            
                                                <tr>
                                                    <td>Email id:</td>
                                                    <td>
                                                        <input type="text" size="50"/>
                                                    </td>
                                                </tr>

                                                <tr>
                                                    <td>Password:</td>
                                                    <td>
                                                        <input type="Password" size="50"/>
                                                    </td>
                                                </tr>

                                                <tr>
                                                    <td>Gender:</td>
                                                    <td><input type="radio" name="gender"/>Male 
                                                    <input type="radio" name="gender"/>Female</td>
                                                </tr>

                                                <tr>
                                                    <td>Department:</td>
                                                        <td>
                                                            <input type="checkbox"/>CSE
                                                        <input type="checkbox"/>IT
                                                        <input type="checkbox"/>ECE
                                                        <input type="checkbox"/>Civil
                                                        <input type="checkbox"/>Mech
                                                        </td>
                                                    </tr>

                                                    <tr>
                                                        <td>Course:</td>
                                                        <td>
                                                            <select>
                                                                <option>----------------------select current course's----------------------</option>
                                                           <option> python</option>
                                                             <option> java</option>
                                                              <option> c++</option>
                                                               <option> HTML</option>
                                                                <option> react</option>
                                                                 <option> PHP</option>
                                                                 </select>
                                                                 </td>
                                                                 </tr>

                                                                 <tr>
                                                                    <td> language:</td>
                                                                    <td>
                                                                        <select>
                                                                            <option>----------------------select spoken language--------------------</option>
                                                                       <option>English</option>
                                                                      <option>Hindi</option> 
                                                                      <option>Urdu</option>
                                                                      <option>Punjabi</option>
                                                                      <option>Sanskrit</option>
                                                                      <option>Bengali</option>
                                                                    </select>
                                                                    </td>
                                                                 </tr>

                                                                 

                                                                 <tr>
                                                                    <td>City:</td>
                                                                    <td><input type="text" size="50"/>
                                                                    </td>
                                                                 </tr>

                                                                 <tr>
                                                                    <td>Address:</td>
                                                                    <td><textarea cols="48" rows="5"></textarea>
                                                                    </td>
                                                                 </tr>

                                                                 <tr>
                                                                    <td colspan="2" align="center">
                                                                        <input type ="SUBMIT" value="Register"/>
                                                                        </td>
                                                                    </tr>
                                                                </fieldsset>
                                                            
                                                             </table>
                                                             </form>
                                                             </body>
                                                             </html>
